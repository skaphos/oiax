version: 2

project_name: oiax

builds:
  - id: oiax
    main: ./cmd/oiax
    binary: oiax
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/skaphos/oiax/internal/version.Version={{.Version}}
      - -X github.com/skaphos/oiax/internal/version.Commit={{.Commit}}
      - -X github.com/skaphos/oiax/internal/version.Date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  disable: true # CHANGELOG.md is release-please managed

release:
  draft: false
  make_latest: true
  footer: |
    See [CHANGELOG.md](https://github.com/skaphos/oiax/blob/{{ .Tag }}/CHANGELOG.md) for the full release notes.
