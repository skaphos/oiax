version: 2

project_name: oiax

builds:
  - id: oiax
    main: ./cmd/oiax
    binary: oiax
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/skaphos/oiax/internal/version.Version={{.Version}}
      - -X github.com/skaphos/oiax/internal/version.Commit={{.Commit}}
      - -X github.com/skaphos/oiax/internal/version.Date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
