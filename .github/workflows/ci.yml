name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dco:
    name: DCO
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on PR commits
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin "${BASE_REF}:${BASE_REF}"
          missing=0
          while IFS= read -r commit; do
            [ -z "$commit" ] && continue
            if ! git log -1 --pretty=%B "$commit" | grep -qi '^Signed-off-by: '; then
              echo "Missing Signed-off-by trailer: $commit"
              missing=1
            fi
          done < <(git rev-list --no-merges "origin/${BASE_REF}..HEAD")

          if [ "$missing" -ne 0 ]; then
            echo "DCO check failed. Rebase/amend with: git commit --signoff"
            exit 1
          fi

  reuse:
    name: REUSE
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install REUSE tool
        run: python -m pip install --upgrade pip reuse
      - name: Run REUSE lint
        run: reuse lint

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run lint task
        run: go -C tools tool task lint

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run coverage test task
        run: go -C tools tool task test-cover
      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.sha }}
          path: coverage.out
          if-no-files-found: error
          retention-days: 30

  quality:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run staticcheck task
        run: go -C tools tool task staticcheck
      - name: Run vulnerability task
        run: go -C tools tool task vuln

  generated:
    name: Verify Generated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Verify generated artifacts are current
        run: go -C tools tool task verify-generated

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [dco, reuse, lint, test, quality, generated]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          install-only: true
      - name: Run CI build task
        run: go -C tools tool task -d .. build-ci
