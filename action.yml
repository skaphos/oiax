name: Oiax
description: >-
  Declarative Git branch promotion reconciler. Ensures the pull requests
  required to move changes through a declared promotion graph exist —
  exactly one active managed request per diverged edge.
author: Skaphos

branding:
  icon: git-pull-request
  color: blue

# The Action is a thin wrapper around the oiax release binary. No
# promotion logic lives in JavaScript, shell, or Action YAML.
#
# Token guidance (load-bearing): pull requests created with the default
# GITHUB_TOKEN leave `on: pull_request` workflow runs waiting for approval
# by a write user. Use a GitHub App installation token for unattended
# production; see docs/architecture.md.

inputs:
  mode:
    description: "What to run: validate, plan, or reconcile."
    required: false
    default: reconcile
  config:
    description: Path to the PromotionGraph configuration file.
    required: false
    default: .oiax.yaml
  config-ref:
    description: >-
      Ref to read configuration from. Defaults to the repository default
      branch; configuration on the triggering ref is deliberately ignored.
    required: false
    default: ""
  token:
    description: >-
      Token used for forge API calls. Prefer a GitHub App installation
      token; GITHUB_TOKEN works but workflow runs caused by an automated
      pull-request open require approval by a write user.
    required: false
    default: ${{ github.token }}
  version:
    description: >-
      Exact Oiax release version to download (for example v1.0.0).
      Defaults to the version recorded by the Action ref, so @v1 follows
      the newest published v1.x.y release.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Download oiax
      shell: bash
      env:
        OIAX_VERSION: ${{ inputs.version }}
        OIAX_ACTION_PATH: ${{ github.action_path }}
        OIAX_ACTION_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail
        if [ -z "${OIAX_VERSION}" ]; then
          manifest="${OIAX_ACTION_PATH}/.release-please-manifest.json"
          OIAX_VERSION="v$(sed -n 's/^[[:space:]]*"\."[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "${manifest}")"
        fi
        if [[ ! "${OIAX_VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "invalid Oiax release version '${OIAX_VERSION}' (want vMAJOR.MINOR.PATCH)" >&2
          exit 1
        fi
        if [[ "${OIAX_ACTION_REF}" =~ ^v([0-9]+)(\.|$) ]]; then
          action_major="${BASH_REMATCH[1]}"
          if [[ "${OIAX_VERSION}" =~ ^v([0-9]+)\. ]]; then
            binary_major="${BASH_REMATCH[1]}"
            if [ "${binary_major}" != "${action_major}" ]; then
              echo "Oiax Action ${OIAX_ACTION_REF} cannot run binary ${OIAX_VERSION}; major versions must match" >&2
              exit 1
            fi
          fi
        fi
        case "${RUNNER_OS}-${RUNNER_ARCH}" in
          Linux-X64)    asset="oiax_${OIAX_VERSION#v}_linux_amd64.tar.gz" ;;
          Linux-ARM64)  asset="oiax_${OIAX_VERSION#v}_linux_arm64.tar.gz" ;;
          macOS-X64)    asset="oiax_${OIAX_VERSION#v}_darwin_amd64.tar.gz" ;;
          macOS-ARM64)  asset="oiax_${OIAX_VERSION#v}_darwin_arm64.tar.gz" ;;
          *) echo "unsupported runner: ${RUNNER_OS}-${RUNNER_ARCH}" >&2; exit 1 ;;
        esac
        base="https://github.com/skaphos/oiax/releases/download/${OIAX_VERSION}"
        dir="$(mktemp -d)"
        curl -fsSL -o "${dir}/${asset}" "${base}/${asset}"
        curl -fsSL -o "${dir}/checksums.txt" "${base}/checksums.txt"
        (cd "${dir}" && grep " ${asset}\$" checksums.txt | sha256sum -c -)
        tar -xzf "${dir}/${asset}" -C "${dir}" oiax
        install -m 0755 "${dir}/oiax" /usr/local/bin/oiax 2>/dev/null || {
          mkdir -p "${HOME}/.local/bin"
          install -m 0755 "${dir}/oiax" "${HOME}/.local/bin/oiax"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
        }

    # actions/checkout materializes only the triggering branch as a local
    # head (refs/heads/<name>) and does not set origin/HEAD. Oiax needs every
    # graph branch resolvable — as refs/remotes/origin/<name> — and the
    # default branch known so the pinned config-ref default resolves. This
    # step only prepares refs; no promotion logic lives in YAML.
    #
    # Run actions/checkout with `fetch-depth: 0` (see the README/architecture
    # quick-start). Its default (fetch-depth: 1) leaves a SHALLOW clone with no
    # merge base, which silently disables the patch-identity and baseline rungs
    # of the equivalence ladder and produces spurious promotion PRs for
    # already-promoted content. This step deliberately does not --unshallow, so
    # a shallow checkout stays shallow: Oiax detects it and emits a WARNING, but
    # only a full-history (fetch-depth: 0) checkout yields correct results.
    - name: Prepare git refs
      shell: bash
      run: |
        set -euo pipefail
        git fetch --no-tags --prune origin "+refs/heads/*:refs/remotes/origin/*"
        git remote set-head origin --auto

    - name: Run oiax
      shell: bash
      env:
        OIAX_MODE: ${{ inputs.mode }}
        OIAX_CONFIG: ${{ inputs.config }}
        OIAX_CONFIG_REF: ${{ inputs.config-ref }}
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        case "${OIAX_MODE}" in
          validate|plan|reconcile) ;;
          *) echo "invalid mode '${OIAX_MODE}' (want validate, plan, or reconcile)" >&2; exit 1 ;;
        esac
        args=("${OIAX_MODE}" --config "${OIAX_CONFIG}")
        if [ -n "${OIAX_CONFIG_REF}" ]; then
          args+=(--config-ref "${OIAX_CONFIG_REF}")
        fi
        oiax "${args[@]}"
