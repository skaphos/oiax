version: "3"

vars:
  TASK_RUNNER: go -C tools tool task -d ..
  GOLANGCI_RUNNER: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
  GOIMPORTS_RUNNER: go run golang.org/x/tools/cmd/goimports@v0.48.0
  STATICCHECK_RUNNER: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0
  GOVULNCHECK_RUNNER: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0

tasks:
  default:
    desc: List available tasks
    cmds:
      - '{{.TASK_RUNNER}} --list'

  build:
    desc: Build the oiax binary for the local OS/ARCH
    cmds:
      - go build -o oiax ./cmd/oiax

  install:
    desc: Install the oiax binary to $GOPATH/bin
    cmds:
      - go install ./cmd/oiax

  build-ci:
    desc: Build all configured platform binaries (CI-style snapshot build)
    cmds:
      - command -v goreleaser >/dev/null 2>&1 || { echo "goreleaser not found in PATH; install the version declared in .tool-versions" >&2; exit 1; }
      - goreleaser build --snapshot --clean

  test:
    desc: Run test suite
    cmds:
      - go test ./...

  test-cover:
    desc: Run tests with coverage output
    cmds:
      - go test -coverprofile=coverage.out ./...

  lint:
    desc: Run linters
    cmds:
      - '{{.GOLANGCI_RUNNER}} run ./...'

  fmt:
    desc: Format code
    cmds:
      - '{{.GOIMPORTS_RUNNER}} -w .'
      - go fmt ./...

  staticcheck:
    desc: Run staticcheck directly
    cmds:
      - '{{.STATICCHECK_RUNNER}} ./...'

  vuln:
    desc: Run vulnerability scan
    cmds:
      - '{{.GOVULNCHECK_RUNNER}} ./...'

  docs:cli-ref:
    desc: Regenerate the CLI command reference from the cobra command tree
    cmds:
      - go run ./cmd/oiax gen docs --out docs/reference/cli.md

  verify-generated:
    desc: Fail when generated artifacts (CLI reference) are stale
    cmds:
      - task: docs:cli-ref
      - |
        paths="docs/reference/cli.md"
        if ! git diff --exit-code -- $paths || \
           [ -n "$(git ls-files --others --exclude-standard -- $paths)" ]; then
          echo "::error::Generated artifacts are stale. Re-run 'task docs:cli-ref' and commit." >&2
          exit 1
        fi

  clean:
    desc: Remove build artifacts and clear Go build outputs
    cmds:
      - go clean ./...
      - go clean -testcache
      - rm -f oiax coverage.out
      - rm -rf dist
